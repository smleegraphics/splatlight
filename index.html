<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>splatlight</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0d10;
        font-family: system-ui, sans-serif;
        color: #e8eaed;
      }
      #gpu-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #overlay {
        position: fixed;
        top: 12px;
        left: 14px;
        font-size: 12px;
        line-height: 1.5;
        opacity: 0.7;
        pointer-events: none;
        user-select: none;
      }
      #error {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        text-align: center;
        padding: 2rem;
        background: #0b0d10;
      }
    </style>
  </head>
  <body>
    <canvas id="gpu-canvas"></canvas>
    <div id="overlay">
      splatlight · Phase 1<br />
      drag = orbit · wheel = zoom · right-drag = pan<br />
      v = ellipsoids / points
    </div>
    <div id="error"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
